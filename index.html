<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ankward Corp. — Time to style the moss industry</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body { height: 100%; }

  body {
    background: #f3f1ec;
    font-family: "Inter", system-ui, sans-serif;
    overflow: hidden;
  }

  /* dark rounded stage inset on the off-white page */
  .stage {
    position: fixed;
    inset: 10px;
    border-radius: 18px;
    overflow: hidden;
    background: #141821;
  }

  .stage canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  /* soft vignette over the 3D scene */
  .vignette {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at 50% 42%, transparent 55%, rgba(8, 10, 15, 0.45) 100%);
  }

  header {
    position: absolute;
    top: 0; left: 0; right: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 22px 28px;
    z-index: 10;
  }

  .logo {
    font-family: "Lora", Georgia, serif;
    font-style: italic;
    font-size: 16px;
    color: #eceef0;
    display: flex;
    align-items: center;
    gap: 8px;
    text-decoration: none;
  }

  .logo svg { display: block; }

  nav {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 34px;
  }

  nav a {
    font-size: 13.5px;
    font-weight: 400;
    letter-spacing: 0.01em;
    color: #d5d9de;
    text-decoration: none;
    padding-bottom: 3px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.38);
    transition: color 0.25s, border-color 0.25s;
  }

  nav a:hover { color: #ffffff; border-color: rgba(255, 255, 255, 0.9); }

  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
    color: #d5d9de;
  }

  .header-right button {
    background: none;
    border: none;
    cursor: pointer;
    color: inherit;
    display: flex;
    padding: 4px;
  }

  .header-right button:hover { color: #fff; }

  .hero {
    position: absolute;
    top: 12%;
    left: 0; right: 0;
    text-align: center;
    z-index: 5;
    pointer-events: none;
  }

  h1 {
    font-family: "Lora", Georgia, serif;
    font-weight: 400;
    font-size: clamp(38px, 6.2vw, 82px);
    line-height: 1.12;
    letter-spacing: 0.005em;
    color: #f2f3f1;
    text-shadow: 0 2px 30px rgba(0, 0, 0, 0.35);
  }

  .scroll-arrow {
    margin-top: 5vh;
    font-family: "Lora", Georgia, serif;
    font-size: 22px;
    color: rgba(240, 242, 240, 0.85);
    animation: bob 2.4s ease-in-out infinite;
  }

  @keyframes bob {
    0%, 100% { transform: translateY(0); }
    50%      { transform: translateY(9px); }
  }

  .credit {
    position: absolute;
    right: 26px;
    bottom: 18px;
    z-index: 10;
    font-family: "Lora", Georgia, serif;
    font-style: italic;
    font-size: 13.5px;
    color: rgba(255, 255, 255, 0.78);
  }

  .hint {
    position: absolute;
    left: 26px;
    bottom: 18px;
    z-index: 10;
    font-size: 11.5px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.4);
  }

  @media (max-width: 720px) {
    nav { display: none; }
    .hint { display: none; }
  }
</style>
</head>
<body>

<div class="stage" id="stage">
  <canvas id="scene"></canvas>
  <div class="vignette"></div>

  <header>
    <a class="logo" href="#">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 0l2.8 9.2L24 12l-9.2 2.8L12 24l-2.8-9.2L0 12l9.2-2.8z"/>
      </svg>
      Ankward Corp.
    </a>

    <nav>
      <a href="#">Pricing</a>
      <a href="#">About moss</a>
      <a href="#">Login</a>
    </nav>

    <div class="header-right">
      <button aria-label="Theme">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M19.1 4.9l-1.4 1.4M6.3 17.7l-1.4 1.4"/>
        </svg>
      </button>
      <button aria-label="Menu">
        <svg width="20" height="14" viewBox="0 0 20 14" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M0 2h20M0 8h20"/>
        </svg>
      </button>
    </div>
  </header>

  <div class="hero">
    <h1>Time to style<br>the moss industry</h1>
    <div class="scroll-arrow">&darr;</div>
  </div>

  <div class="hint">Move your cursor to grow moss</div>
  <div class="credit">Tribute to Amin Ankward</div>
</div>

<script type="module">
import * as THREE from "./vendor/three.module.js";

/* ============================== setup ============================== */

const canvas = document.getElementById("scene");
const stage = document.getElementById("stage");

const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x141821);
scene.fog = new THREE.Fog(0x141821, 14, 30);

const camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
camera.position.set(0, 0.4, 9);

const LIGHT_DIR = new THREE.Vector3(0.5, 0.85, 0.6).normalize();

/* ============================ starfield ============================ */

function makeStars(count, size, opacity) {
  const pos = new Float32Array(count * 3);
  for (let i = 0; i < count; i++) {
    pos[i * 3 + 0] = (Math.random() - 0.5) * 60;
    pos[i * 3 + 1] = (Math.random() - 0.5) * 40;
    pos[i * 3 + 2] = -8 - Math.random() * 20;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute("position", new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({
    color: 0xc9d2e0,
    size,
    sizeAttenuation: true,
    transparent: true,
    opacity,
    depthWrite: false,
    fog: false,
  });
  return new THREE.Points(geo, mat);
}
scene.add(makeStars(420, 0.045, 0.85));
scene.add(makeStars(700, 0.022, 0.5));

/* ====================== procedural branch shape ===================== */

function hash2(x, y) {
  const s = Math.sin(x * 127.1 + y * 311.7) * 43758.5453;
  return s - Math.floor(s);
}
function vnoise(x, y) {
  const xi = Math.floor(x), yi = Math.floor(y);
  const xf = x - xi, yf = y - yi;
  const u = xf * xf * (3 - 2 * xf), v = yf * yf * (3 - 2 * yf);
  const a = hash2(xi, yi), b = hash2(xi + 1, yi);
  const c = hash2(xi, yi + 1), d = hash2(xi + 1, yi + 1);
  return a + (b - a) * u + (c - a) * v + (a - b - c + d) * u * v;
}
function fbm2(x, y) {
  let f = 0, amp = 0.5;
  for (let i = 0; i < 4; i++) {
    f += amp * vnoise(x, y);
    x *= 2.03; y *= 2.03; amp *= 0.5;
  }
  return f;
}

const BRANCH_LEN = 20;
const BRANCH_RADIUS = 0.55;

function makeBranchGeometry(seed) {
  const geo = new THREE.CylinderGeometry(
    BRANCH_RADIUS, BRANCH_RADIUS, BRANCH_LEN, 56, 90, false
  );
  const p = geo.attributes.position;
  for (let i = 0; i < p.count; i++) {
    const x = p.getX(i), y = p.getY(i), z = p.getZ(i);
    const r0 = Math.sqrt(x * x + z * z);
    if (r0 < 1e-5) continue; // cap centers
    const ang = Math.atan2(z, x);
    // organic lumps + long ridges running down the bark
    let r = r0 * (0.72 +
      0.55 * fbm2(y * 0.55 + seed, ang * 1.4 + seed * 3) +
      0.06 * Math.sin(ang * 5 + y * 0.8 + seed));
    // taper toward both ends
    const t = Math.abs(y) / (BRANCH_LEN / 2);
    r *= 1 - 0.3 * t * t;
    let nx = Math.cos(ang) * r;
    let nz = Math.sin(ang) * r;
    // slow bend so branches do not look like straight pipes
    nx += Math.sin(y * 0.21 + seed * 2) * 0.45;
    nz += Math.cos(y * 0.16 + seed) * 0.3;
    p.setXYZ(i, nx, y, nz);
  }
  geo.computeVertexNormals();
  return geo;
}

/* ======================= shaders (bark + moss) ====================== */

const GLSL_NOISE = /* glsl */ `
  float hash21(vec2 p) {
    p = fract(p * vec2(123.34, 456.21));
    p += dot(p, p + 45.32);
    return fract(p.x * p.y);
  }
  float vnoise(vec2 p) {
    vec2 i = floor(p), f = fract(p);
    vec2 u = f * f * (3.0 - 2.0 * f);
    float a = hash21(i);
    float b = hash21(i + vec2(1.0, 0.0));
    float c = hash21(i + vec2(0.0, 1.0));
    float d = hash21(i + vec2(1.0, 1.0));
    return mix(mix(a, b, u.x), mix(c, d, u.x), u.y);
  }
  float fbm(vec2 p) {
    float f = 0.0, amp = 0.5;
    for (int i = 0; i < 5; i++) {
      f += amp * vnoise(p);
      p *= 2.04;
      amp *= 0.5;
    }
    return f;
  }
`;

const COMMON_VERT = /* glsl */ `
  varying vec2 vUv;
  varying vec3 vNormal;
  varying vec3 vViewPos;
  void main() {
    vUv = uv;
    vNormal = normalize(normalMatrix * normal);
    vec4 mv = modelViewMatrix * vec4(position, 1.0);
    vViewPos = mv.xyz;
    gl_Position = projectionMatrix * mv;
  }
`;

// bark surface; turns into dark moss substrate where the mask is painted
const barkFragment = /* glsl */ `
  uniform sampler2D uMask;
  uniform vec3 uLightDir;
  uniform vec3 uFogColor;
  uniform float uFogNear;
  uniform float uFogFar;
  varying vec2 vUv;
  varying vec3 vNormal;
  varying vec3 vViewPos;
  ${GLSL_NOISE}
  void main() {
    // anisotropic noise: long fibrous streaks along the branch
    vec2 q = vec2(vUv.x * 26.0, vUv.y * 240.0);
    float streaks = fbm(q);
    float lumps = fbm(vec2(vUv.x * 9.0, vUv.y * 38.0));
    float cracks = smoothstep(0.42, 0.32, fbm(vec2(vUv.x * 50.0, vUv.y * 90.0)));

    vec3 barkLight = vec3(0.48, 0.345, 0.235);
    vec3 barkDark  = vec3(0.14, 0.09, 0.06);
    vec3 col = mix(barkDark, barkLight, streaks * 0.75 + lumps * 0.35);
    col = mix(col, barkDark * 0.7, cracks * 0.6);

    // painted moss substrate
    float m = texture2D(uMask, vUv).r;
    vec3 mossBase = vec3(0.075, 0.16, 0.05) * (0.7 + 0.6 * lumps);
    col = mix(col, mossBase, smoothstep(0.04, 0.45, m));

    // lighting
    vec3 n = normalize(vNormal);
    float diff = max(dot(n, uLightDir), 0.0);
    float rim = pow(1.0 - max(dot(n, normalize(-vViewPos)), 0.0), 2.5);
    col *= 0.32 + 0.85 * diff;
    col += rim * vec3(0.10, 0.12, 0.16);

    float depth = length(vViewPos);
    float fogF = smoothstep(uFogNear, uFogFar, depth);
    col = mix(col, uFogColor, fogF);
    gl_FragColor = vec4(col, 1.0);
  }
`;

// shell-textured fur: each layer is a slice of the moss at height uShell
const shellVertex = /* glsl */ `
  uniform float uShell;
  uniform float uTime;
  varying vec2 vUv;
  varying vec3 vNormal;
  varying vec3 vViewPos;
  void main() {
    vUv = uv;
    vNormal = normalize(normalMatrix * normal);
    vec3 p = position + normal * uShell * 0.26;
    // faint sway at the tips
    float sway = uShell * uShell * 0.02;
    p.x += sin(uTime * 1.4 + position.y * 2.2) * sway;
    p.z += cos(uTime * 1.1 + position.y * 1.7) * sway;
    vec4 mv = modelViewMatrix * vec4(p, 1.0);
    vViewPos = mv.xyz;
    gl_Position = projectionMatrix * mv;
  }
`;

const shellFragment = /* glsl */ `
  uniform sampler2D uMask;
  uniform float uShell;
  uniform vec3 uLightDir;
  uniform vec3 uFogColor;
  uniform float uFogNear;
  uniform float uFogFar;
  varying vec2 vUv;
  varying vec3 vNormal;
  varying vec3 vViewPos;
  ${GLSL_NOISE}
  void main() {
    float m = texture2D(uMask, vUv).r;
    if (m < 0.02) discard;

    // one moss strand per cell; aspect matched to branch UV stretch
    vec2 cell = vUv * vec2(150.0, 720.0);
    vec2 id = floor(cell);
    vec2 f = fract(cell) - 0.5;

    float h = hash21(id);
    float strandH = m * (0.45 + 0.55 * h);
    if (uShell > strandH) discard;

    float r = 0.46 * (1.0 - uShell / strandH);
    if (dot(f, f) > r * r) discard;

    // moss colour: dark at root, bright yellow-green at tip
    vec3 root = vec3(0.05, 0.12, 0.035);
    vec3 mid  = vec3(0.28, 0.46, 0.12);
    vec3 tip  = vec3(0.62, 0.78, 0.28);
    float t = uShell / max(strandH, 0.001);
    vec3 col = mix(root, mid, smoothstep(0.0, 0.65, t));
    col = mix(col, tip, smoothstep(0.6, 1.0, t));
    col *= 0.75 + 0.5 * hash21(id + 7.13); // per-strand variation

    // lighting + fake self-occlusion
    float diff = max(dot(normalize(vNormal), uLightDir), 0.0);
    col *= (0.35 + 0.8 * diff) * mix(0.45, 1.0, uShell);

    float depth = length(vViewPos);
    float fogF = smoothstep(uFogNear, uFogFar, depth);
    col = mix(col, uFogColor, fogF);
    gl_FragColor = vec4(col, 1.0);
  }
`;

/* ===================== paintable moss mask texture =================== */

const MASK_W = 256, MASK_H = 1024;

function makeMask() {
  const cv = document.createElement("canvas");
  cv.width = MASK_W;
  cv.height = MASK_H;
  const ctx = cv.getContext("2d");
  ctx.fillStyle = "#000";
  ctx.fillRect(0, 0, MASK_W, MASK_H);
  const tex = new THREE.CanvasTexture(cv);
  tex.wrapS = THREE.RepeatWrapping;
  return { cv, ctx, tex };
}

function paintMask(mask, u, v, radius, strength) {
  const { ctx, tex } = mask;
  const px = u * MASK_W;
  const py = (1 - v) * MASK_H; // CanvasTexture flips Y
  ctx.globalCompositeOperation = "lighter";
  for (const ox of [-MASK_W, 0, MASK_W]) { // wrap around the seam
    const g = ctx.createRadialGradient(px + ox, py, 0, px + ox, py, radius);
    g.addColorStop(0, `rgba(255,255,255,${strength})`);
    g.addColorStop(1, "rgba(255,255,255,0)");
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.arc(px + ox, py, radius, 0, Math.PI * 2);
    ctx.fill();
  }
  tex.needsUpdate = true;
}

/* =========================== build branches ========================== */

const SHELLS = 24;
const fogUniforms = () => ({
  uFogColor: { value: new THREE.Color(0x141821) },
  uFogNear: { value: 14 },
  uFogFar: { value: 30 },
});

const branchGroup = new THREE.Group();
scene.add(branchGroup);

const paintTargets = [];

function buildBranch(seed, transform) {
  const geo = makeBranchGeometry(seed);
  const mask = makeMask();

  const barkMat = new THREE.ShaderMaterial({
    vertexShader: COMMON_VERT,
    fragmentShader: barkFragment,
    uniforms: {
      uMask: { value: mask.tex },
      uLightDir: { value: LIGHT_DIR },
      ...fogUniforms(),
    },
  });

  const root = new THREE.Group();
  const base = new THREE.Mesh(geo, barkMat);
  root.add(base);

  const shellMats = [];
  for (let i = 1; i <= SHELLS; i++) {
    const mat = new THREE.ShaderMaterial({
      vertexShader: shellVertex,
      fragmentShader: shellFragment,
      uniforms: {
        uMask: { value: mask.tex },
        uShell: { value: i / SHELLS },
        uTime: { value: 0 },
        uLightDir: { value: LIGHT_DIR },
        ...fogUniforms(),
      },
    });
    shellMats.push(mat);
    root.add(new THREE.Mesh(geo, mat));
  }

  transform(root);
  branchGroup.add(root);
  paintTargets.push({ base, mask, shellMats });
}

// branch 1: lower-left to upper-right
buildBranch(3.1, (g) => {
  g.rotation.z = Math.PI / 2 - 0.38;
  g.rotation.y = 0.25;
  g.position.set(0.3, -1.5, 0);
});

// branch 2: upper-left to lower-right, slightly behind
buildBranch(7.7, (g) => {
  g.rotation.z = Math.PI / 2 + 0.42;
  g.rotation.y = -0.2;
  g.position.set(-0.3, -1.6, -0.7);
});

/* ====================== interaction: grow the moss ==================== */

const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2(10, 10); // offscreen until first move
const target = { x: 0, y: 0 };
let zoom = 9;

function tryPaint(strength, radius) {
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(paintTargets.map((t) => t.base));
  if (!hits.length || !hits[0].uv) return;
  const hit = hits[0];
  const entry = paintTargets.find((t) => t.base === hit.object);
  paintMask(entry.mask, hit.uv.x, hit.uv.y, radius, strength);
}

stage.addEventListener("pointermove", (e) => {
  const r = stage.getBoundingClientRect();
  pointer.x = ((e.clientX - r.left) / r.width) * 2 - 1;
  pointer.y = -((e.clientY - r.top) / r.height) * 2 + 1;
  target.x = pointer.x;
  target.y = pointer.y;
  tryPaint(0.13, 32);
});

stage.addEventListener("wheel", (e) => {
  e.preventDefault();
  zoom = Math.min(11.5, Math.max(5.5, zoom + e.deltaY * 0.004));
}, { passive: false });

// seed a starter moss patch where the branches cross
function seedMoss() {
  for (let i = 0; i < 140; i++) {
    const a = Math.random() * Math.PI * 2;
    const d = Math.random() * 0.16;
    const sx = Math.cos(a) * d * 0.8;
    const sy = -0.2 + Math.sin(a) * d;
    raycaster.setFromCamera(new THREE.Vector2(sx, sy), camera);
    const hits = raycaster.intersectObjects(paintTargets.map((t) => t.base));
    if (hits.length && hits[0].uv) {
      const entry = paintTargets.find((t) => t.base === hits[0].object);
      paintMask(entry.mask, hits[0].uv.x, hits[0].uv.y, 22, 0.3);
    }
  }
}

/* ============================ resize + loop =========================== */

function resize() {
  const w = stage.clientWidth, h = stage.clientHeight;
  renderer.setSize(w, h, false);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
}
window.addEventListener("resize", resize);
resize();

const clock = new THREE.Clock();
let seeded = false;

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();

  // mouse parallax + wheel dolly
  camera.position.x += (target.x * 0.7 - camera.position.x) * 0.04;
  camera.position.y += (0.4 + target.y * 0.4 - camera.position.y) * 0.04;
  camera.position.z += (zoom - camera.position.z) * 0.06;
  camera.lookAt(0, -0.4, 0);

  for (const entry of paintTargets) {
    for (const mat of entry.shellMats) mat.uniforms.uTime.value = t;
  }

  renderer.render(scene, camera);

  if (!seeded) {
    seeded = true;
    seedMoss(); // world matrices are only valid after the first render
  }
}
animate();
</script>

</body>
</html>
